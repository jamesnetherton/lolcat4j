name: Lolcat4j Release

on:
  push:
    tags:
      - '*'

jobs:
  build-jar:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get-version.outputs.version }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: temurin
      - name: Cache Maven Artifacts
        uses: actions/cache@v5
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2
      - name: Build JAR
        run: mvn -B -ntp package -DskipTests
      - name: Get Version
        id: get-version
        run: echo "version=${{ github.ref_name }}" >> $GITHUB_OUTPUT
      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: jar
          path: target/lolcat4j-${{ github.ref_name }}.jar

  build-native:
    needs: build-jar
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            native-name: lolcat4j-linux-amd64
            asset-name: lolcat4j-linux-amd64
          - os: windows-latest
            native-name: lolcat4j-windows-amd64
            asset-name: lolcat4j-windows-amd64.exe
          - os: macos-latest
            native-name: lolcat4j-macos-aarch64
            asset-name: lolcat4j-macos-aarch64
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
      - name: Set up GraalVM
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: '21'
          distribution: graalvm
      - name: Cache Maven Artifacts
        uses: actions/cache@v5
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2
      - name: Build JAR
        run: mvn -B -ntp package -DskipTests
      - name: Build Native Image (Unix)
        if: runner.os != 'Windows'
        run: |
          native-image -jar target/lolcat4j-${{ github.ref_name }}.jar \
            -H:Name=${{ matrix.native-name }} \
            --no-fallback
      - name: Build Native Image (Windows)
        if: runner.os == 'Windows'
        shell: cmd
        run: native-image -jar target/lolcat4j-${{ github.ref_name }}.jar -H:Name=${{ matrix.native-name }} --no-fallback
      - name: Upload Native Binary
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset-name }}
          path: ${{ matrix.asset-name }}

  release:
    needs: [build-jar, build-native]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ github.ref_name }}
          files: |
            lolcat4j-${{ needs.build-jar.outputs.version }}.jar
            lolcat4j-linux-amd64
            lolcat4j-windows-amd64.exe
            lolcat4j-macos-aarch64
